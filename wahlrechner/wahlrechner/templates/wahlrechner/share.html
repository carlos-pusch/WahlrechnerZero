<!-- lz_d_1: Share-Widget -->
<!-- lz_e_1: Teilen-Widget für iframe und andere Sachen angepasst -->
<style>
  /* Nur Dialog und Overlay – der Button verwendet die globale .btn-Klasse */
  .share-widget-dialog {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 95%;
    max-width: 600px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.15);
    padding: 24px;
    z-index: 1000;
  }
  .share-widget-dialog.is-open {
    display: block;
  }
  .share-widget-dialog-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .share-widget-dialog-title {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    white-space: pre-line;
  }
  .share-widget-close {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: flex;
  }
  .share-widget-close:hover {
    background-color: #f0f2f5;
  }
  .share-widget-targets {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .share-widget-target {
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    background: #f0f2f5;
    border: 1px solid #ccd0d5;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    color: #1c1e21;
    cursor: pointer;
  }
  .share-widget-target:hover {
    background-color: #e4e6e9;
  }
  .share-widget-target svg {
    width: 24px;
    height: 24px;
    margin-right: 10px;
  }
  .share-widget-link {
    display: flex;
    align-items: center;
    background: #f0f2f5;
    border-radius: 6px;
    padding: 10px 14px;
  }
  .share-widget-url {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
    color: #555;
    margin-right: 12px;
  }
  .share-widget-copy {
    background: #fff;
    border: 1px solid #ccd0d5;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .share-widget-copy:hover {
    background-color: #e4e6e9;
  }
  .share-widget-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 999;
  }
  .share-widget-overlay.is-open {
    display: block;
  }
  .hidden-symbols {
    position: absolute;
    width: 0;
    height: 0;
    overflow: hidden;
  }
</style>

<!-- Trigger-Button mit urlencode -->
<button class="btn share-trigger" type="button" style="display: inline-flex; justify-content: center; align-items: center; gap: 0.5rem;"
        data-url="{{ share_url|urlencode }}"
        data-title="{{ share_title|urlencode }}"
        data-desc="{{ share_dialog_title|default:'Seite teilen'|urlencode }}">
  {% include "icons/share.html" %}
  <span>Teilen</span>
</button>

<script>
(function() {
  if (window._shareWidgetInitialized) return;
  window._shareWidgetInitialized = true;

  function createShareDialog() {
    if (document.getElementById('sw-dialog')) return;

    const overlay = document.createElement('div');
    overlay.className = 'share-widget-overlay';
    overlay.id = 'sw-overlay';
    document.body.appendChild(overlay);

    const dialog = document.createElement('div');
    dialog.className = 'share-widget-dialog';
    dialog.id = 'sw-dialog';
    dialog.setAttribute('role', 'dialog');
    dialog.setAttribute('aria-modal', 'true');

    dialog.innerHTML = `
      <div class="share-widget-dialog-header">
        <h3 class="share-widget-dialog-title" id="sw-dialog-title"></h3>
        <button class="share-widget-close" aria-label="Schließen">
          <svg width="20" height="20"><use href="#sw-close"></use></svg>
        </button>
      </div>
      <div class="share-widget-targets">
        <a class="share-widget-target" data-platform="facebook" href="#"><svg><use href="#sw-facebook"></use></svg>Facebook</a>
        <a class="share-widget-target" data-platform="linkedin" href="#"><svg><use href="#sw-linkedin"></use></svg>LinkedIn</a>
        <a class="share-widget-target" data-platform="whatsapp" href="#"><svg><use href="#sw-whatsapp"></use></svg>WhatsApp</a>
        <a class="share-widget-target" data-platform="email" href="#"><svg><use href="#sw-email"></use></svg>E-Mail</a>
        <a class="share-widget-target" data-platform="signal" href="#"><svg><use href="#sw-signal"></use></svg>Signal</a>
        <a class="share-widget-target" data-platform="instagram" href="#"><svg><use href="#sw-instagram"></use></svg>Instagram</a>
      </div>
      <div class="share-widget-link">
        <div class="share-widget-url" id="sw-url"></div>
        <button class="share-widget-copy" id="sw-copy">Link kopieren</button>
      </div>
    `;
    document.body.appendChild(dialog);

    const closeBtn = dialog.querySelector('.share-widget-close');
    const overlayEl = document.getElementById('sw-overlay');

    function closeDialog() {
      dialog.classList.remove('is-open');
      overlayEl.classList.remove('is-open');
    }

    closeBtn.addEventListener('click', closeDialog);
    overlayEl.addEventListener('click', closeDialog);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && dialog.classList.contains('is-open')) closeDialog();
    });

    const copyBtn = document.getElementById('sw-copy');
    copyBtn.addEventListener('click', function() {
      const url = document.getElementById('sw-url').textContent;
      copyToClipboard(url).then(() => showCopyFeedback(copyBtn));
    });

    const targets = dialog.querySelectorAll('.share-widget-target');
    targets.forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const platform = this.dataset.platform;
        const url = document.getElementById('sw-url').textContent;
        const title = document.getElementById('sw-dialog-title').textContent;
        const encodedUrl = encodeURIComponent(url);
        const encodedTitle = encodeURIComponent(title);
        let shareHref = '';
        switch (platform) {
          case 'facebook': shareHref = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`; window.open(shareHref, '_blank'); break;
          case 'linkedin': shareHref = `https://www.linkedin.com/shareArticle?mini=true&url=${encodedUrl}&title=${encodedTitle}`; window.open(shareHref, '_blank'); break;
          case 'whatsapp': shareHref = `https://wa.me/?text=${encodedTitle}%20-%20${encodedUrl}`; window.open(shareHref, '_blank'); break;
          case 'email': shareHref = `mailto:?subject=${encodedTitle}&body=${encodedUrl}`; window.location.href = shareHref; break;
          default: copyToClipboard(url).then(() => showCopyFeedback(this));
        }
        if (['facebook','linkedin','whatsapp','email'].includes(platform)) closeDialog();
      });
    });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); return Promise.resolve(); }
    catch(e) { return Promise.reject(e); }
    finally { document.body.removeChild(textarea); }
  }

  function showCopyFeedback(btn) {
    const orig = btn.textContent;
    btn.textContent = 'Kopiert!';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }

  createShareDialog();

  document.addEventListener('click', function(e) {
    const trigger = e.target.closest('.share-trigger');
    if (!trigger) return;

    // Werte dekodieren (URL-encoded)
    const url = decodeURIComponent(trigger.dataset.url);
    const title = decodeURIComponent(trigger.dataset.title);
    const desc = decodeURIComponent(trigger.dataset.desc || '');

    const inIframe = window.self !== window.top;
    if (!inIframe && navigator.share) {
      navigator.share({
        title: title,
        text: desc,
        url: url
      }).catch((err) => {
        console.warn('Share API failed, fallback to dialog', err);
        openDialog(url, title, desc);
      });
    } else {
      openDialog(url, title, desc);
    }
  });

  function openDialog(url, title, desc) {
    const dialog = document.getElementById('sw-dialog');
    const overlay = document.getElementById('sw-overlay');
    if (!dialog || !overlay) return;

    document.getElementById('sw-url').textContent = url;
    document.getElementById('sw-dialog-title').textContent = desc || 'Seite teilen';

    dialog.classList.add('is-open');
    overlay.classList.add('is-open');
    const closeBtn = dialog.querySelector('.share-widget-close');
    if (closeBtn) closeBtn.focus();
  }

})();
</script>
